<div class='post_meta'>
  <svg class="icon">
    <use xlink:href="#calendar"></use>
  </svg>
  <span class="post_date">
    {{- if eq .Site.Language.Lang "br" }}
    {{ .Date.Day }} de {{ index .Site.Data.meses (printf "%d" .Date.Month) }} de {{ .Date.Year }}
    {{- else }}
    {{ .Date.Format "Jan 2, 2006" }}
    {{- end }}
  </span>
  {{- with .Params.tags -}}
  {{- range . }}
  {{- $tag := . | urlize }}
  <a href='{{ absLangURL (printf "tags/%s" $tag) }}' class='post_tag button button_translucent'>
    {{- . }}
  </a>
  {{- end }}
  {{- end }}
</div>
